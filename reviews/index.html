  <aside class="side-menu" id="sideMenu" aria-label="Site menu">

      <div class="side-menu-header">

          <div class="brand-mark" aria-hidden="true"><svg viewBox="0 0 64 64" role="img" aria-label="Toilet roll icon"><rect x="12" y="18" width="34" height="24" rx="7"></rect><circle cx="26" cy="30" r="6"></circle><path d="M46 20c5 0 9 4 9 9s-4 9-9 9"></path><path d="M20 44c2 7 6 11 11 13"></path><path d="M42 18c4 1 7 3 10 6"></path></svg></div>
          <div class="brand-title" style="color: var(--ink);">Where to Poop: Toronto</div>
        </div>
        <button class="menu-close" id="menuClose" aria-label="Close menu">×</button>
      </div>
      <nav class="side-nav">
        <a class="side-link" href="../index.html">Home</a>
        <a class="side-link" href="../reviews/">Reviews</a>
        <div class="side-sub-links">
          <a class="side-sub-link" href="../reviews/cafe-landwer-on-bloor/">Cafe Landwer on Bloor</a>
          <a class="side-sub-link" href="../reviews/gerstein-library-public-toilet/">Gerstein Library Public Toilet</a>
        </div>
      </nav>
    </div>
  </aside>
  <div class="menu-scrim" id="menuScrim" hidden></div>

  <header class="topbar">
    <div class="container topbar-inner">
      <div class="brand">
        <div class="brand-mark" aria-hidden="true"><svg viewBox="0 0 64 64" role="img" aria-label="Toilet roll icon"><rect x="12" y="18" width="34" height="24" rx="7"></rect><circle cx="26" cy="30" r="6"></circle><path d="M46 20c5 0 9 4 9 9s-4 9-9 9"></path><path d="M20 44c2 7 6 11 11 13"></path><path d="M42 18c4 1 7 3 10 6"></path></svg></div>
        <div class="brand-title">Where to Poop: Toronto</div>
      </div>
    </div>
  </header>
  
<main class="page-shell">
  <div class="container page-grid">
    <aside class="list-cta-card">
      <div class="eyebrow">Separate review pages</div>
      <h2 style="margin:0;">Reviews</h2>
      <p>Painstakingly researched. Generously shared.</p>
      <div class="results-copy" id="results-count"></div>
      <div style="display:grid; gap:0.6rem; margin-top:1rem;">
        <a class="btn btn-primary" href="../index.html">Back home</a>
        <a class="btn btn-secondary" href="#">Feedback Form</a>
        <a class="btn btn-tertiary" href="#">Toilet Review Request</a>
      </div>
    </aside>

    <section>
      <div class="controls-section">
        <div class="controls-panel">
          <div class="controls">
            <div class="control-wide">
              <label for="searchInput">Search</label>
              <input id="searchInput" type="text" placeholder="Search title, location, area, neighborhood, suitable for, notes, or review text" />
            </div>
            <div>
              <label for="areaFilter">Area</label>
              <select id="areaFilter"><option value="all">All areas</option></select>
            </div>
            <div>
              <label for="neighborhoodFilter">Neighborhood</label>
              <select id="neighborhoodFilter"><option value="all">All neighborhoods</option></select>
            </div>
            <div>
              <label for="suitableFilter">Suitable for</label>
              <select id="suitableFilter">
                <option value="all">All options</option>
                <option value="No. 1">No. 1</option>
                <option value="No. 1 &amp; No. 2">No. 1 &amp; No. 2</option>
              </select>
            </div>
            <div>
              <label for="sortSelect">Sort</label>
              <select id="sortSelect">
                <option value="featured">Featured Toilet first</option>
                <option value="newest">Newest first</option>
                <option value="oldest">Oldest first</option>
                <option value="highest">Highest overall</option>
                <option value="lowest">Lowest overall</option>
                <option value="area">Area A–Z</option>
                <option value="neighborhood">Neighborhood A–Z</option>
              </select>
            </div>
          </div>
        </div>
      </div>
      <section class="reviews-list-section">
        <div id="reviewGrid" class="review-grid"></div>
      </section>
    </section>
  </div>
</main>

  <script src="../script.js"></script>
</body>
</html>
